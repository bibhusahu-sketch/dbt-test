name: Deploy and Run dbt on Cloud Run

on:
  push:
    branches:
      - main

# Mandatory security tokens to allow keyless authentication handshakes
permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: dt-bibhu-sandbox-dev
  REGION: europe-west2
  GAR_REPO: dbt-pipeline-registry
  IMAGE_NAME: dbt-core-pipeline
  SERVICE_ACCOUNT: sa-dbt-transformation-dev@dt-bibhu-sandbox-dev.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull down the repository files
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Connect to GCP Keylessly using Workload Identity Federation
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
        
          workload_identity_provider: "projects/227163214672/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider"
          service_account: ${{ env.SERVICE_ACCOUNT }}

      # 3. Configure local docker settings to push images to GCP
      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 4. Compile and Tag the Container Image
      - name: Build and Push Docker Image
        run: |
          TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $TAG .
          docker push $TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # 5. Automatically create or refresh the Cloud Run Job layout
      - name: Deploy Cloud Run Job
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          job: dbt-transform-job
          image: ${{ env.IMAGE_TAG }}
          region: ${{ env.REGION }}
          # 🔐 FORCES the job to execute using its own credentials, fixing the error
          flags: '--service-account=${{ env.SERVICE_ACCOUNT }}'

      # 6. Instruct Cloud Run to immediately process calculations inside BigQuery
      - name: Execute dbt transformations
        run: |
          gcloud run jobs execute dbt-transform-job \
            --region=${{ env.REGION }} \
            --args="build" \
            --wait
